<mdui-dialog
  v-bind:open="myPrivateStatus"
  v-bind:headline="dialogTitle"
  close-on-overlay-click
  close-on-esc
  v-on:closed="onDialogClosed($event)"
>
  <slot></slot>
  <button
    slot="header"
    v-on:click="dialogClose"
    class="nd-dialog-close"
    title="关闭"
  >&times;</button>
</mdui-dialog>
