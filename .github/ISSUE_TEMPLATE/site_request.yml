name: 站点请求
description: 请求添加新站点
title: "[Site Request]: "
body:
  - type: checkboxes
    id: Prerequisites
    attributes:
      label: 必要条件
      description: |
        为了减少无效报告，请确认每一个选项。
      options:
        - label: 我已经搜索 issue 区（包含已关闭的 issue），并确定没有相同的请求存在。
          required: true
        - label: 我已经确认该网站不可以使用 https://greasyfork.org/zh-CN/scripts/25068-downloadallcontent 或者 https://github.com/dodying/UserJs/blob/master/novel/novelDownloader/novelDownloader3.user.js 下载。
          required: true
  - type: textarea
    id: SiteName
    attributes:
      label: 站点名称
    validations:
      required: true
  - type: textarea
    id: SiteURL
    attributes:
      label: 站点 URL
    validations:
      required: true
  - type: dropdown
    id: SiteType
    attributes:
      label: 站点类型
      options:
        - 原创网站
        - 转载网站
    validations:
      required: true
  - type: checkboxes
    id: SiteAttributes
    attributes:
      label: 站点属性
      options:
        - label: 有收费章节存在
        - label: 所有内容有要求账户登录的限制（未登录不可浏览相关内容）
        - label: 部分内容（如收费章节）仅限App端可浏览
  - type: textarea
    id: reason
    attributes:
      label: 希望添加的理由
    validations:
      required: true
  - type: textarea
    id: books
    attributes:
      label: 你认为该站值得阅读的书籍（必须涵盖题目，简介，链接），至少2本以供开发者参考评估此网站的质量（收录完整性，错字率，信息完整度等，开发者可以在不提供理由的情况下拒绝适配）。
    validations:
      required: true